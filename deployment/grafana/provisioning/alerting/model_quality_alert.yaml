# Grafana unified-alerting rule, provisioned at startup.
# Fires a Grafana-side alert when model_rmse_score > 200 for >1 min.
# Source format: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
apiVersion: 1

groups:
  - orgId: 1
    name: BikeSharingModelGroup
    folder: Bike Sharing
    interval: 30s
    rules:
      - uid: rmse-alert-grafana
        title: HighModelRMSE_Grafana
        condition: C                        # freely choosen 
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: model_rmse_score
              instant: true                 # every explicit value, every ex 30 secounds 
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__        # C is Expression, Grafana waits
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [200]
                    type: gt               # greather then
                  reducer:
                    type: last
                  query:
                    params: [A]             # Takae value A grather then 200, C gets True 
                  operator:
                    type: and
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 10s                             # C = True over 1 mins?
        annotations:
          summary: "Bike-sharing model RMSE > 200 (Grafana alert)"
          description: "model_rmse_score has exceeded 200 for over 1 minute. Trigger via 'make fire-alert'."
        labels:
          severity: warning
          source: grafana
