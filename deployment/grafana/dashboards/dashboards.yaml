# Auto-load every JSON dashboard from /etc/grafana/dashboards/ on startup.
# This is the "Dashboards as Code" mechanism -- no manual import on a fresh
# machine.
apiVersion: 1

providers:
  - name: 'bike-monitoring'
    orgId: 1
    folder: 'Bike Sharing'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
