# docker-compose.yml -- launches:
#   - bike-api      : FastAPI service exposing /predict, /evaluate, /metrics
#   - prometheus    : scrapes bike-api + node-exporter, evaluates alert rules
#   - grafana       : dashboards + alerting (provisioned, no manual setup)
#   - node-exporter : host metrics for the Infrastructure Overview dashboard
#
# All four services share the default compose network, so Prometheus can
# reach the API as `bike-api:8080`, and Grafana can reach Prometheus as
# `prometheus:9090`.

services:
  bike-api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    image: bike-api:latest
    container_name: bike-api
    ports:
      - "8080:8080"
    environment:
      - ARTIFACTS_DIR=/app/artifacts
      - MODEL_PATH=/app/artifacts/model.joblib
      - REFERENCE_DATA_PATH=/app/artifacts/reference.parquet
    volumes:
      # Persist the trained model + reference parquet so the API does not
      # re-download UCI data on every restart.
      # -fsS -> Fail silent if http status >= 400, S = shows only Error
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped   # always restart unless explicitly stopped via make

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus    # persist prometheus data where everything is stored, also e.x. TSDB Time Series db
    command:
      - --config.file=/etc/prometheus/prometheus.yml # prometheus gets telled where it config lies
      - --storage.tsdb.path=/prometheus         # prometheus gets time series data in persistent store
      - --web.enable-lifecycle
    depends_on:
      - bike-api
    restart: unless-stopped

  evaluation:
    build:
      context: .
      dockerfile: src/evaluation/Dockerfile
    depends_on:
      - bike-api
    command: ["python", "run_evaluation.py", "--api-url", "http://bike-api:8080"]


  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # credentials
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Enable Grafana's alerting
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    volumes:
      # Provisioning -- read-only, NOT a bind-mount of host-specific paths.
      # `make` on a fresh machine works because everything is committed.
      # - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro   # kernel, processes, memory, etc.
      - /sys:/host/sys:ro     # hardware infos, devices, Kernel sub
      - /:/rootfs:ro          # Standard for node expoter, acves on host system to mine system metrics
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      # /dev , /proc, /sys, /run, and Docker/Kubelet directories are excluded because they are either virtual filesystems or have a high churn of mount points that would cause noise in the metrics.
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/kubelet/.+|rootfs/run|rootfs/var/lib/docker/.+)($$|/)
      # only real disk and partiuitions shall be tracked
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|tmpfs)$$
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
