# Main Prometheus configuration.
# Scrapes the bike-api, node-exporter and Prometheus itself.
# Loads alert rules from /etc/prometheus/rules/.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rule files are mounted from deployment/prometheus/rules/.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: bike-api
    metrics_path: /metrics
    static_configs:
      - targets: ['bike-api:8080']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
