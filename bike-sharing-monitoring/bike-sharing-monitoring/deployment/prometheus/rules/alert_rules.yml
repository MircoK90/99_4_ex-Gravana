# Alert rules for the bike-sharing monitoring stack.
#
# - BikeAPIDown          : satisfies "at least one alert (API is down)"
# - HighModelRMSE        : satisfies the ML-quality alert requirement
# - DatasetDriftDetected : binary drift alert, ties into the custom metric
groups:
  - name: bike_api_infra
    rules:
      - alert: BikeAPIDown
        expr: up{job="bike-api"} == 0
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "bike-api scrape target is down"
          description: |
            Prometheus has been unable to scrape bike-api:8080 for >1m.
            Check 'docker compose ps' and the API logs.

      - alert: BikeAPIHighErrorRate
        expr: |
          sum(rate(api_requests_total{status_code=~"5.."}[2m]))
            /
          sum(rate(api_requests_total[2m])) > 0.05
        for: 2m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "bike-api 5xx rate above 5% for >2m"
          description: "Investigate exceptions in the API logs."

  - name: bike_api_model
    rules:
      - alert: HighModelRMSE
        expr: model_rmse_score > 200
        for: 1m
        labels:
          severity: warning
          category: model_quality
        annotations:
          summary: "Bike model RMSE is high"
          description: |
            model_rmse_score has been above 200 for >1m
            (current value: {{ $value }}).
            Likely cause: distributional shift in the latest /evaluate batch.

      - alert: DatasetDriftDetected
        expr: evidently_dataset_drift_detected == 1
        for: 30s
        labels:
          severity: warning
          category: data_drift
        annotations:
          summary: "Evidently flagged dataset drift"
          description: |
            evidently_dataset_drift_detected == 1 on the last evaluation batch.
            Review the per-feature drift report and consider retraining.
